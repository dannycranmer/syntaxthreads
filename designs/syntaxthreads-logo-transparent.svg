<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4500 4500" width="4500" height="4500">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- No background - transparent -->
  <!-- Opening brace -->
  <text x="420" y="2500" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="900" font-weight="800" fill="#00ff41" filter="url(#glow)">{</text>
  <!-- Brand name -->
  <text x="950" y="2150" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="510" font-weight="800" fill="#e5e5e5" letter-spacing="-15">Syntax</text>
  <text x="950" y="2750" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="510" font-weight="800" fill="#e5e5e5" letter-spacing="-15">Threads</text>
  <!-- Closing brace -->
  <text x="3700" y="2500" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="900" font-weight="800" fill="#00ff41" filter="url(#glow)">}</text>
  <!-- Tagline -->
  <text x="2250" y="3350" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="135" fill="#999" text-anchor="middle">dev humor you can wear</text>
  <!-- Decorative cursor -->
  <rect x="2245" y="3450" width="15" height="120" fill="#00ff41" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>