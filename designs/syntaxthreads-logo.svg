<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5000 5000" width="5000" height="5000">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="5000" height="5000" fill="url(#bgGrad)" rx="90"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="1250" x2="5000" y2="1250" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="0" y1="2500" x2="5000" y2="2500" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="0" y1="3750" x2="5000" y2="3750" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="1250" y1="0" x2="1250" y2="5000" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="2500" y1="0" x2="2500" y2="5000" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="3750" y1="0" x2="3750" y2="5000" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Logo: {SyntaxThreads} — one line, braces+Threads green, Syntax white -->
  <!-- font-size 400, monospace char ~240px wide -->
  <!-- { at 580, Syntax at 940, Threads at 2380, } at 4180 -->
  <text x="580" y="2640" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="400" font-weight="800" fill="#00ff41" filter="url(#glow)">{</text>
  <text x="940" y="2640" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="400" font-weight="800" fill="#e5e5e5">Syntax</text>
  <text x="2380" y="2640" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="400" font-weight="800" fill="#00ff41" filter="url(#glow)">Threads</text>
  <text x="4060" y="2640" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="400" font-weight="800" fill="#00ff41" filter="url(#glow)">}</text>
</svg>
