<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5000 5000" width="5000" height="5000">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="5000" height="5000" fill="url(#bgGrad)" rx="90"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="1250" x2="5000" y2="1250" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="0" y1="2500" x2="5000" y2="2500" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="0" y1="3750" x2="5000" y2="3750" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="1250" y1="0" x2="1250" y2="5000" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="2500" y1="0" x2="2500" y2="5000" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="3750" y1="0" x2="3750" y2="5000" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Opening brace -->
  <text x="467" y="2778" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="1000" font-weight="800" fill="#00ff41" filter="url(#glow)">{</text>
  <!-- Brand name -->
  <text x="1056" y="2389" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="567" font-weight="800" fill="#e5e5e5" letter-spacing="-17">Syntax</text>
  <text x="1056" y="3056" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="567" font-weight="800" fill="#e5e5e5" letter-spacing="-17">Threads</text>
  <!-- Closing brace -->
  <text x="4111" y="2778" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="1000" font-weight="800" fill="#00ff41" filter="url(#glow)">}</text>
  <!-- Tagline -->
  <text x="2500" y="3722" font-family="'Source Code Pro','SF Mono','Fira Code',monospace" font-size="150" fill="#666" text-anchor="middle">humor you can wear</text>
  <!-- Decorative cursor -->
  <rect x="2494" y="3833" width="17" height="133" fill="#00ff41" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
