<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5000 5000" width="5000" height="5000">
  <g transform="scale(1.11111)">
  <!-- Transparent background - no rect -->
  <!-- Decorative code brackets -->
  <text x="400" y="1950" font-family="'Source Code Pro','SF Mono','Fira Code','Consolas',monospace" font-size="1400" font-weight="300" fill="#58a6ff" opacity="0.15">{</text>
  <text x="3500" y="3200" font-family="'Source Code Pro','SF Mono','Fira Code','Consolas',monospace" font-size="1400" font-weight="300" fill="#58a6ff" opacity="0.15">}</text>
  <!-- Main text - bold clean style -->
  <text x="2250" y="1500" font-family="'Inter','Helvetica Neue','Arial',sans-serif" font-size="520" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-10">it works on</text>
  <text x="2250" y="2100" font-family="'Inter','Helvetica Neue','Arial',sans-serif" font-size="520" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-10">my machine</text>
