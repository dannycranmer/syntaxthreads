<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5000 5000" width="5000" height="5000">
  <g transform="scale(1.11111)">
  <!-- Transparent background -->
  <!-- Terminal window -->
  <rect x="80" y="80" width="4340" height="4340" rx="60" ry="60" fill="#1a1a2e"/>
  <!-- Black border stroke -->
  <rect x="80" y="80" width="4340" height="4340" rx="60" ry="60" fill="none" stroke="#000000" stroke-width="8"/>
  <!-- Title bar -->
  <rect x="80" y="80" width="4340" height="280" rx="60" ry="60" fill="#2d2d44"/>
  <rect x="80" y="240" width="4340" height="120" fill="#2d2d44"/>
  <!-- Traffic light buttons -->
  <circle cx="300" cy="220" r="50" fill="#ff5f57"/>
  <circle cx="460" cy="220" r="50" fill="#febc2e"/>
  <circle cx="620" cy="220" r="50" fill="#28c840"/>
  <!-- Title text -->
  <text x="2250" y="245" font-family="'Source Code Pro','SF Mono','Fira Code','Consolas',monospace" font-size="120" fill="#888899" text-anchor="middle">bash — 80×24</text>
  <!-- Prompt line -->
  <text x="200" y="600" font-family="'Source Code Pro','SF Mono','Fira Code','Consolas',monospace" font-size="110" fill="#28c840">$</text>
  <text x="320" y="600" font-family="'Source Code Pro','SF Mono','Fira Code','Consolas',monospace" font-size="110" fill="#ccccdd">./deploy.sh</text>
  <rect x="1070" y="520" width="65" height="100" fill="#00ff41" opacity="0.7"/>
  <!-- Main text -->
  <text x="2250" y="1700" font-family="'Source Code Pro','SF Mono','Fira Code','Consolas',monospace" font-size="420" font-weight="bold" fill="#00ff41" text-anchor="middle">it works on</text>
  <text x="2250" y="2250" font-family="'Source Code Pro','SF Mono','Fira Code','Consolas',monospace" font-size="420" font-weight="bold" fill="#00ff41" text-anchor="middle">my machine</text>
  <!-- Shrug -->
  <text x="2250" y="3200" font-family="'Noto Sans CJK JP','Source Code Pro','SF Mono','Fira Code','Consolas',monospace" font-size="410" fill="#00ff41" text-anchor="middle" opacity="0.85">¯\_(ツ)_/¯</text>
</g>
</svg>
